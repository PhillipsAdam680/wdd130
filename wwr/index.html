<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <meta name="description"
      content="This is the main page of a company that manages trips with experienced guides and provide a thrilling yet safe experience.">
    <meta name="author" content="Adam Phillips">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-splash.png" alt="Rafting logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <div class="hero">
            <img src="images/main-banner.jpg" alt="Rafting down river">
            <h1>Are you ready to make a splash?</h1>
        </div>

        <section>
            <h2>Where will you make your splash?</h2>
            <figure class="trip">
                <figure class="tripimg">
                    <img src="images/campingscene.jpg" alt="camping">
                    <figcaption>Camping</figcaption>
                </figure>
                <figure class="tripimg">
                    <img src="images/raftingoffering.jpg" alt="rafting">
                    <figcaption>Rafting</figcaption>
                </figure>
                <figure class="tripimg">
                    <img src="images/hikingoffering.jpg" alt="hiking">
                    <figcaption>Hiking</figcaption>
                </figure>

            </figure>
        </section>
        <section>


            <div class="contact-section">
                <div class="hero">

                    <img src="images/mssion.jpg" alt="Rafting down river">

                    <h2>"Dont ever be afraid to make your life a splash!"</h2>
                    <p>- Levi Winger, Splash CEO</p>
                </div>
                <div class="hero">
                    <form>

                        <div class="form-row">
                            <label for="username">Name</label>
                            <input type="text" id="username" name="username"
                              placeholder="Placeholder">
                        </div>
                        <div class="form-row">
                            <label for="useremail">Email</label>
                            <input type="email" id="useremail" name="useremail"
                              placeholder="Placeholder">
                        </div>
                        <label class="checkbox-line">
                            <input type="checkbox" name="newsletter" id="newsletter">
                            Please subscribe me to the monthly newsletter
                            <div class="mission">
                                <h2>Our Mission</h2>
                                <p>We provdie the enjoyment of outdoor activites for you and your
                                    group. Wheather you rafting with your friends or roasting
                                    marshmallows with your family we have you covered. No matter the
                                    occassion we focus on you and your next adventure. Make your
                                    splash!</p>
                            </div>

                            <nav>
                                <button type="submit"><a href="contact.html">
                                        <h2>Book your splash!</h2>
                                    </a></button>
                            </nav>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <div class="footer-text">
            <p>&copy; 2026 Splash Rafting | Adam Phillips.</p>
        </div>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="LinkedIn Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram-square.svg" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>


</html>
